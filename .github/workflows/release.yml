name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.platform_label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_label: macOS Apple Silicon
            runner: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macos-aarch64
            rust_targets: aarch64-apple-darwin
          - platform_label: macOS Intel
            runner: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macos-x86_64
            rust_targets: x86_64-apple-darwin
          - platform_label: Ubuntu
            runner: ubuntu-22.04
            target: ''
            artifact_name: linux-x86_64
            rust_targets: ''
          - platform_label: Windows
            runner: windows-latest
            target: ''
            artifact_name: windows-x86_64
            rust_targets: ''

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust_targets != ''
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.runner }}-${{ matrix.artifact_name }}

      - name: Install dependencies (Ubuntu)
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Generate Windows icon
        if: matrix.runner == 'windows-latest'
        run: |
          pip install pillow
          python -c "from PIL import Image; img = Image.open('src-tauri/icons/icon.png'); img.save('src-tauri/icons/icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build Tauri app (macOS ${{ matrix.target }})
        if: matrix.runner == 'macos-latest'
        run: npm run tauri:build -- --target ${{ matrix.target }} --bundles app,dmg

      - name: Build Tauri app (Linux)
        if: matrix.runner == 'ubuntu-22.04'
        run: npm run tauri:build -- --bundles deb,appimage

      - name: Build Tauri app (Windows)
        if: matrix.runner == 'windows-latest'
        run: npm run tauri:build -- --bundles nsis

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_DIR="src-tauri/target/release/bundle"
          ROOT_TARGET_DIR="target/release"
          APP_TARGET_DIR="src-tauri/target/release"
          BUNDLED_BIN_DIR="src-tauri/bundled-binaries"

          if [ -n "${{ matrix.target }}" ]; then
            SOURCE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
            ROOT_TARGET_DIR="target/${{ matrix.target }}/release"
            APP_TARGET_DIR="src-tauri/target/${{ matrix.target }}/release"
          fi

          if [ ! -d "$SOURCE_DIR" ]; then
            echo "Bundle output directory not found: $SOURCE_DIR" >&2
            exit 1
          fi

          DIST_DIR="release-dist"
          rm -rf "$DIST_DIR"
          mkdir -p "$DIST_DIR"

          find "$SOURCE_DIR" -type f \( \
            -name "*.dmg" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*setup.exe" \
          \) -exec cp {} "$DIST_DIR"/ \;

          PACKAGE_DIR="$(mktemp -d)"
          trap 'rm -rf "$PACKAGE_DIR"' EXIT

          if [ "${{ matrix.runner }}" = "windows-latest" ]; then
            cp "$APP_TARGET_DIR/xiic-ssh-manager-desktop.exe" "$PACKAGE_DIR/"
            cp "$BUNDLED_BIN_DIR/xiic-ssh-approval.exe" "$PACKAGE_DIR/"
            cp "$BUNDLED_BIN_DIR/xiic-ssh-mcp.exe" "$PACKAGE_DIR/"
            tar -czf "$DIST_DIR/xiic-ssh-manager-desktop-windows-x86_64.tar.gz" -C "$PACKAGE_DIR" .
          else
            cp "$APP_TARGET_DIR/xiic-ssh-manager-desktop" "$PACKAGE_DIR/"
            cp "$BUNDLED_BIN_DIR/xiic-ssh-approval" "$PACKAGE_DIR/"
            cp "$BUNDLED_BIN_DIR/xiic-ssh-mcp" "$PACKAGE_DIR/"
            if [ "${{ matrix.runner }}" = "macos-latest" ]; then
              tar -czf "$DIST_DIR/xiic-ssh-manager-desktop-${{ matrix.target }}.tar.gz" -C "$PACKAGE_DIR" .
            else
              tar -czf "$DIST_DIR/xiic-ssh-manager-desktop-x86_64-unknown-linux-gnu.tar.gz" -C "$PACKAGE_DIR" .
            fi
          fi

          if [ -z "$(find "$DIST_DIR" -maxdepth 1 -type f -print -quit)" ]; then
            echo "No release files were collected." >&2
            exit 1
          fi

          find "$DIST_DIR" -maxdepth 1 -type f | sort

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.artifact_name }}
          path: release-dist
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download bundled artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: bundle-*
          merge-multiple: true

      - name: Collect release files
        id: collect_files
        shell: bash
        run: |
          find release-assets -type f | sort > release-files.txt
          if [ ! -s release-files.txt ]; then
            echo "No release files were downloaded." >&2
            exit 1
          fi
          {
            echo 'files<<EOF'
            cat release-files.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: See the assets to download and install this version.
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: ${{ steps.collect_files.outputs.files }}
